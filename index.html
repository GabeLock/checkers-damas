<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Damas</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game">
        <div class="topbar">
          <div>
            <p class="eyebrow" data-i18n="eyebrow">Jogo de tabuleiro</p>
            <h1 data-i18n="title">Damas</h1>
          </div>
          <div class="controls" aria-label="Game controls">
            <select id="language" aria-label="Language">
              <option value="pt-BR">Português</option>
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
            </select>
            <button id="restart" type="button" data-i18n="restart">Reiniciar</button>
          </div>
        </div>

        <div class="stage">
          <div class="board-wrap">
            <div id="board" class="board" aria-label="Checkers board"></div>
          </div>

          <aside class="panel">
            <div class="mode-panel">
              <label for="game-mode" data-i18n="modeLabel">Modo de jogo</label>
              <select id="game-mode">
                <option value="local" data-i18n="modeLocal">Local</option>
                <option value="bot" data-i18n="modeBot">Contra bot</option>
                <option value="online" data-i18n="modeOnline">Online</option>
              </select>

              <div id="bot-options" class="stack hidden">
                <label for="bot-level" data-i18n="botLevel">Nivel do bot</label>
                <select id="bot-level">
                  <option value="easy" data-i18n="botEasy">Facil</option>
                  <option value="medium" data-i18n="botMedium">Medio</option>
                  <option value="hard" data-i18n="botHard">Velho da praca</option>
                </select>
              </div>

              <div id="online-options" class="stack hidden">
                <label for="player-name" data-i18n="playerName">Seu nome</label>
                <input id="player-name" type="text" maxlength="24" autocomplete="nickname" placeholder="GabeLock">
                <div class="online-actions">
                  <button id="login-online" type="button" data-i18n="loginOnline">Entrar</button>
                  <button id="create-room" type="button" data-i18n="createRoom">Criar sala</button>
                </div>
                <div id="online-state" class="online-state"></div>
              </div>
            </div>

            <div class="scoreline">
              <span data-i18n="turn">Turno</span>
              <strong id="turn-label">Vermelhas</strong>
            </div>
            <div id="status" class="status" role="status" aria-live="polite"></div>

            <div class="score-grid" aria-label="Score">
              <div>
                <span data-i18n="red">Vermelhas</span>
                <strong id="red-count">12</strong>
              </div>
              <div>
                <span data-i18n="black">Pretas</span>
                <strong id="black-count">12</strong>
              </div>
            </div>

            <div class="rules">
              <h2 data-i18n="rulesTitle">Pontos base</h2>
              <ul>
                <li data-i18n="ruleMove">Peças comuns movem uma casa na diagonal.</li>
                <li data-i18n="ruleCapture">Capturas são obrigatórias quando disponíveis.</li>
                <li data-i18n="ruleKing">Ao chegar ao final, a peça vira dama.</li>
                <li data-i18n="ruleWin">Vence quem capturar ou bloquear todas as peças rivais.</li>
              </ul>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
